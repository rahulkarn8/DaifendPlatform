# Daifend stack — see docs/LOCAL_DEV.md and docs/HARDENING.md
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: daifend
      POSTGRES_PASSWORD: daifend
      POSTGRES_DB: daifend
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daifend"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nats:
    image: nats:2.10-alpine
    ports:
      - "4222:4222"

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.11
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 1G
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "19092:19092"

  qdrant:
    image: qdrant/qdrant:v1.12.0
    ports:
      - "6333:6333"
      - "6334:6334"

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./infrastructure/docker/clickhouse/init:/docker-entrypoint-initdb.d:ro

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: daifend
      MINIO_ROOT_PASSWORD: daifendsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  opa:
    image: openpolicyagent/opa:0.69.0
    command:
      - run
      - --server
      - --addr=:8181
      - /policies
    volumes:
      - ./infrastructure/opa/policies:/policies:ro
    ports:
      - "8181:8181"

  auth-service:
    build:
      context: ./apps/auth-service
    environment:
      JWT_SECRET: dev-secret-change-in-production
      DAIFEND_ENV: development
    ports:
      - "8001:8001"

  threat-engine:
    build:
      context: .
      dockerfile: apps/threat-engine/Dockerfile
    environment:
      ENGINE_REQUIRE_INTERNAL_TOKEN: "true"
      INTERNAL_SERVICE_TOKEN: dev-internal-token
    ports:
      - "8002:8002"

  memory-integrity-engine:
    build:
      context: .
      dockerfile: apps/memory-integrity-engine/Dockerfile
    environment:
      QDRANT_URL: http://qdrant:6333
      DATABASE_URL: postgresql+psycopg://daifend:daifend@postgres:5432/daifend
      NATS_URL: nats://nats:4222
      CLICKHOUSE_HTTP_URL: http://clickhouse:8123
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      ENGINE_REQUIRE_INTERNAL_TOKEN: "true"
      INTERNAL_SERVICE_TOKEN: dev-internal-token
    ports:
      - "8003:8003"
      - "50051:50051"
    depends_on:
      - postgres
      - qdrant
      - nats
      - clickhouse
      - jaeger

  agent-runtime-engine:
    build:
      context: .
      dockerfile: apps/agent-runtime-engine/Dockerfile
    environment:
      ENGINE_REQUIRE_INTERNAL_TOKEN: "true"
      INTERNAL_SERVICE_TOKEN: dev-internal-token
      OPA_URL: http://opa:8181
    ports:
      - "8004:8004"
    depends_on:
      - opa

  self-healing-engine:
    build:
      context: .
      dockerfile: apps/self-healing-engine/Dockerfile
    environment:
      ENGINE_REQUIRE_INTERNAL_TOKEN: "true"
      INTERNAL_SERVICE_TOKEN: dev-internal-token
    ports:
      - "8005:8005"

  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    environment:
      ENGINE_REQUIRE_INTERNAL_TOKEN: "true"
      INTERNAL_SERVICE_TOKEN: dev-internal-token
    ports:
      - "8006:8006"

  telemetry-service:
    build:
      context: .
      dockerfile: apps/telemetry-service/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      TELEMETRY_ORIGINS: http://127.0.0.1:3000,http://localhost:3000
      CLICKHOUSE_HTTP_URL: http://clickhouse:8123
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      DEFAULT_TENANT_ID: default
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "4001:4001"
    depends_on:
      - nats
      - clickhouse
      - redpanda
      - jaeger

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    environment:
      JWT_SECRET: dev-secret-change-in-production
      INTERNAL_SERVICE_TOKEN: dev-internal-token
      GATEWAY_SEND_INTERNAL_TOKEN: "true"
      REDIS_URL: redis://redis:6379/0
      AUTH_SERVICE_URL: http://auth-service:8001
      MEMORY_INTEGRITY_URL: http://memory-integrity-engine:8003
      MEMORY_GRPC_TARGET: memory-integrity-engine:50051
      AGENT_RUNTIME_URL: http://agent-runtime-engine:8004
      THREAT_ENGINE_URL: http://threat-engine:8002
      SELF_HEALING_URL: http://self-healing-engine:8005
      NOTIFICATION_URL: http://notification-service:8006
      CORS_ORIGINS: http://127.0.0.1:3000,http://localhost:3000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - jaeger
      - auth-service
      - memory-integrity-engine
      - agent-runtime-engine
      - threat-engine
      - self-healing-engine
      - notification-service

  web:
    image: node:22-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && npm run db:generate --workspace=@daifend/web 2>/dev/null || true && npm run dev -- --hostname 0.0.0.0 --port 3000"
    volumes:
      - ./:/app
    environment:
      NEXT_PUBLIC_DAIFEND_MODE: live
      NEXT_PUBLIC_API_GATEWAY_URL: http://127.0.0.1:8080
      NEXT_PUBLIC_TELEMETRY_URL: http://127.0.0.1:4001
      DATABASE_URL: postgresql://daifend:daifend@postgres:5432/daifend
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - api-gateway
      - telemetry-service

volumes:
  pgdata: {}
  miniodata: {}
