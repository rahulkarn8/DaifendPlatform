{{- if and .Values.memoryIntegrity .Values.memoryIntegrity.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "daifend.name" . }}-memory-integrity
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "daifend.name" . }}-memory-integrity
  minReplicas: {{ .Values.memoryIntegrity.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.memoryIntegrity.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.memoryIntegrity.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
