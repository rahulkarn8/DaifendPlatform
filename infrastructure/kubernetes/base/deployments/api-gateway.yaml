apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: daifend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: daifend/api-gateway:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: daifend-env
          env:
            # Production: mount from External Secrets / Vault; do not commit real values.
            - name: JWT_SECRET
              value: "replace-with-external-secret"
            - name: INTERNAL_SERVICE_TOKEN
              value: "replace-with-external-secret"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
